# Nginx configuration for server.videoscrambler.com
# Place this file at: /etc/nginx/sites-available/videoscrambler
# Then symlink: ln -s /etc/nginx/sites-available/videoscrambler /etc/nginx/sites-enabled/videoscrambler
# Reload: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name server.videoscrambler.com;

    # ---------------------------------------------------------------
    # Increase body size limit to handle large video file uploads.
    # Node.js / multer are already configured for 250 MB, so this
    # must be at least as large as that limit (set to 500 M for headroom).
    # ---------------------------------------------------------------
    client_max_body_size 500M;

    # Increase timeouts for large uploads and long-running video processing
    client_body_timeout     300s;
    proxy_connect_timeout   300s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;
    send_timeout            300s;

    # Proxy all traffic to Node.js app
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Buffer settings for large uploads
        proxy_request_buffering off;
        proxy_buffering         off;
    }
}

